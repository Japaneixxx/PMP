name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # ===== BACKEND BUILD =====
  backend:
    name: Backend Tests & Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Compile Backend
      run: cd backend && mvn clean compile
    
    - name: Run Backend Tests
      run: cd backend && mvn test
    
    - name: Build Backend
      run: cd backend && mvn clean package -DskipTests
    
    - name: Upload Backend Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/*.jar
        retention-days: 7

  # ===== FRONTEND BUILD =====
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install Dependencies
      run: cd frontend && npm ci
    
    - name: Run Linter
      run: cd frontend && npm run lint --if-present
    
    - name: Run Tests
      run: cd frontend && npm test --if-present
    
    - name: Build Frontend
      run: cd frontend && npm run build
    
    - name: Upload Frontend Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 7

  # ===== CODE QUALITY =====
  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Run Backend Code Quality
      run: cd backend && mvn sonar:sonar -Dsonar.projectKey=pmp-backend || true
      if: always()
    
    - name: Check Dependencies Security (Backend)
      run: cd backend && mvn org.owasp:dependency-check-maven:check || true
      if: always()

  # ===== SECURITY SCAN =====
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy Results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      if: always()

  # ===== STATUS CHECK =====
  status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [backend, frontend, quality]
    if: always()
    
    steps:
    - name: Check Build Status
      run: |
        if [ "${{ needs.backend.result }}" == "failure" ] || [ "${{ needs.frontend.result }}" == "failure" ]; then
          echo "❌ Build Failed!"
          exit 1
        fi
        echo "✅ Build Passed!"
